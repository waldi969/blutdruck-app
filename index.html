<!doctype html>
<html lang="de">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Blutdruck Cloud-Tracker</title>
		<style>
			:root {
				--primary: #2196f3;
				--bg: #f4f4f9;
			}
			body {
				font-family: sans-serif;
				background: var(--bg);
				margin: 20px;
				color: #333;
			}
			.card {
				background: white;
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				margin-bottom: 20px;
			}
			.chart-container {
				position: relative;
				height: 300px;
				width: 100%;
			}
			h2 {
				color: var(--primary);
				margin-top: 0;
			}
			input {
				width: 100%;
				padding: 12px;
				margin: 8px 0;
				border: 1px solid #ddd;
				border-radius: 8px;
				box-sizing: border-box;
				font-size: 16px;
			}
			button {
				width: 100%;
				background: var(--primary);
				color: white;
				border: none;
				padding: 12px;
				border-radius: 8px;
				font-size: 16px;
				cursor: pointer;
			}
			button.secondary {
				background: #607d8b;
				margin-top: 10px;
			}
			table {
				width: 100%;
				border-collapse: collapse;
				margin-top: 20px;
			}
			th,
			td {
				text-align: left;
				padding: 10px;
				border-bottom: 1px solid #ddd;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h2>Werte eintragen</h2>
			<input
				type="number"
				id="sys"
				placeholder="Systole (oben) z.B. 120"
				inputmode="numeric"
			/>
			<input
				type="number"
				id="dia"
				placeholder="Diastole (unten) z.B. 80"
				inputmode="numeric"
			/>
			<input
				type="number"
				id="puls"
				placeholder="Puls z.B. 70"
				inputmode="numeric"
			/>
			<button id="btnSpeichern">In Cloud speichern</button>
		</div>

		<div class="card">
			<h2>Verlauf</h2>
			<div class="chart-container">
				<canvas id="verlaufChart"></canvas>
			</div>
		</div>

		<div class="card">
			<h2>Deine Historie (Cloud)</h2>
			<div id="liste">Verbinde mit Datenbank...</div>
			<button id="btnExport" class="secondary">Als PDF exportieren</button>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf-autotable.min.js"></script>
		<script type="module">
			import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
			import {
				getFirestore,
				collection,
				addDoc,
				query,
				orderBy,
				onSnapshot,
			} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

			const firebaseConfig = {
				apiKey: "AIzaSyCe0UHiualJOGmsCzNvzFTw8SKMjeYRhSw",
				authDomain: "blutdruck-app-f5cd5.firebaseapp.com",
				projectId: "blutdruck-app-f5cd5",
				storageBucket: "blutdruck-app-f5cd5.appspot.com",
				messagingSenderId: "1065023739171",
				appId: "1:1065023739171:web:fab3b38c155909ae44e896",
				measurementId: "G-NS9S2LMRY5",
			};

			const app = initializeApp(firebaseConfig);
			const db = getFirestore(app);
			const messungRef = collection(db, "messungen");

			// Globale Variablen für Chart und Export
			let messungenData = [];
			let verlaufChart;

			document // Speicher-Funktion
				.getElementById("btnSpeichern")
				.addEventListener("click", async () => {
					const sys = document.getElementById("sys").value;
					const dia = document.getElementById("dia").value;
					const puls = document.getElementById("puls").value;

					if (!sys || !dia || !puls)
						return alert("Bitte alle Felder ausfüllen!");

					try {
						await addDoc(messungRef, {
							sys: parseInt(sys),
							dia: parseInt(dia),
							puls: parseInt(puls),
							zeitpunkt: new Date(),
						});
						// Felder leeren
						document.getElementById("sys").value = "";
						document.getElementById("dia").value = "";
						document.getElementById("puls").value = "";
					} catch (e) {
						alert("Fehler beim Speichern: " + e.message);
					}
				});

			// Chart-Funktion
			function createOrUpdateChart(data) {
				const ctx = document.getElementById("verlaufChart").getContext("2d");
				const labels = data
					.map((d) =>
						d.zeitpunkt
							? d.zeitpunkt.toDate().toLocaleString("de-DE", {
									day: "2-digit",
									month: "2-digit",
									hour: "2-digit",
									minute: "2-digit",
								})
							: "",
					)
					.reverse();
				const sysData = data.map((d) => d.sys).reverse();
				const diaData = data.map((d) => d.dia).reverse();
				const pulsData = data.map((d) => d.puls).reverse();

				if (verlaufChart) {
					verlaufChart.data.labels = labels;
					verlaufChart.data.datasets[0].data = sysData;
					verlaufChart.data.datasets[1].data = diaData;
					verlaufChart.data.datasets[2].data = pulsData;
					verlaufChart.update();
				} else {
					verlaufChart = new Chart(ctx, {
						type: "line",
						data: {
							labels: labels,
							datasets: [
								{
									label: "Systole",
									data: sysData,
									borderColor: "#f44336",
									backgroundColor: "#f4433633",
									fill: true,
									tension: 0.2,
								},
								{
									label: "Diastole",
									data: diaData,
									borderColor: "#2196f3",
									backgroundColor: "#2196f333",
									fill: true,
									tension: 0.2,
								},
								{
									label: "Puls",
									data: pulsData,
									borderColor: "#4caf50",
									backgroundColor: "#4caf5033",
									fill: true,
									tension: 0.2,
									yAxisID: "y1", // Sekundäre Achse für Puls
								},
							],
						},
						options: {
							responsive: true,
							maintainAspectRatio: false,
							scales: {
								y: {
									beginAtZero: false,
									position: "left",
									title: { display: true, text: "Blutdruck (mmHg)" },
								},
								y1: {
									beginAtZero: false,
									position: "right",
									title: { display: true, text: "Puls (bpm)" },
									grid: { drawOnChartArea: false },
								},
							},
						},
					});
				}
			}

			// Echtzeit-Anzeige der Daten
			const q = query(messungRef, orderBy("zeitpunkt", "desc"));
			onSnapshot(q, (snapshot) => {
				const messungen = [];
				let html =
					"<table><tr><th>Datum</th><th>SYS</th><th>DIA</th><th>Puls</th></tr>";
				snapshot.forEach((doc) => {
					const d = doc.data();
					// Sicherstellen, dass der Eintrag einen Zeitstempel hat, um Fehler zu vermeiden
					if (d.zeitpunkt && d.zeitpunkt.toDate) {
						messungen.push(d);
						const datum = d.zeitpunkt.toDate().toLocaleString("de-DE");
						const puls = d.puls || "-"; // Fallback für alte Einträge ohne Puls
						html += `<tr><td>${datum}</td><td>${d.sys}</td><td>${d.dia}</td><td>${puls}</td></tr>`;
					}
				});
				html += "</table>";
				document.getElementById("liste").innerHTML = html;

				messungenData = messungen; // Daten für Export bereitstellen
				createOrUpdateChart(messungen); // Chart aktualisieren
			});

			// Export-Funktion
			document.getElementById("btnExport").addEventListener("click", () => {
				if (messungenData.length === 0) {
					return alert("Keine Daten zum Exportieren vorhanden.");
				}

				const { jsPDF } = window.jspdf;
				const doc = new jsPDF();

				doc.text("Blutdruck-Historie", 14, 16);

				const tableData = messungenData.map((d) => [
					d.zeitpunkt.toDate().toLocaleString("de-DE"),
					d.sys,
					d.dia,
					d.puls,
				]);

				doc.autoTable({
					head: [["Datum", "Systole (mmHg)", "Diastole (mmHg)", "Puls (bpm)"]],
					body: tableData,
					startY: 20,
				});

				doc.save("blutdruck-historie.pdf");
			});
		</script>
	</body>
</html>
